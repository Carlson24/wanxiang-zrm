# Rime schema
# encoding: utf-8
schema:
  schema_id: wanxiang_english
  name: 英文·自然万象
  version: "lts"
  author: amzxyz
  description: |
    支持整句输入英文的语句流方案，拥有更加智能的词组上屏加空格策略，支持单词组、语句任意词组中首字母大写或者全大写格式化。

switches:
  - name: ascii_mode
    reset: 0
    states: [整句, 字母]

engine:
  processors:
    - ascii_composer
    - key_binder
    - speller
    - recognizer
    - selector
    - navigator
    - express_editor
  segmentors:
    - matcher
    - ascii_segmentor
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - table_translator
    - table_translator@wanxiang_english #英文词汇表导入
    - punct_translator
  filters:
    - lua_filter@*wanxiang.auto_phrase
    - lua_filter@*wanxiang.super_english
    - uniquifier

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA\
  delimiter: " '"
  algebra:
    __patch: "wanxiang_algebra:/zrm/english"

translator:
  dictionary: wanxiang_english
  enable_user_dict: false
  initial_quality: 2
  comment_format:
    - xform/^~.+$//

key_binder:
  import_preset: default
  bindings:
    - { when: always, accept: Shift+space, select: .next }

wanxiang_english:
  dictionary: wanxiang_english
  user_dict: "userdatabase/en"
  enable_completion: true
  enable_sentence: true
  initial_quality: 3
  comment_format:
    - xform/^~.+$//
  english_spacing: off
  spacing_timeout: 5
